name: UI Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: TestNG suite to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - regression

permissions:
  contents: read

concurrency:
  group: ui-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selenium:
    name: ${{ inputs.suite || 'smoke' }} suite
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      TEST_SUITE: ${{ inputs.suite || 'smoke' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Show browser version
        run: google-chrome --version

      - name: Run TestNG suite
        run: >-
          mvn --batch-mode --no-transfer-progress clean test
          -Dheadless=true
          -DsuiteXmlFile=src/test/resources/suites/${TEST_SUITE}.xml

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ui-test-evidence-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            target/surefire-reports/
            target/allure-results/
            reports/screenshots/
            reports/logs/
